<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҚМЖ - Әдістемелік нұсқаулар</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .kmj-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .kmj-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .kmj-table th, .kmj-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .kmj-table th {
            background-color: #27ae60;
            color: white;
        }
        .download-btn {
            background-color: #e74c3c;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .download-btn:hover {
            background-color: #c0392b;
        }
        .template-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 5px solid #27ae60;
        }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">← Басты мәзірге қайту</a>
    </div>
</nav>

<main class="container">
    <div class="kmj-container">
        <h2 style="text-align: center; color: #2c3e50;">Қысқа мерзімді жоспарлар (ҚМЖ) жинағы</h2>
        

        <h3>Сыныптар бойынша дайын ҚМЖ нұсқалары</h3>
        <table class="kmj-table">
            <thead>
                <tr>
                    <th>Сынып</th>
                    <th>Формат</th>
                    <th>Әрекет</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>7-сынып</td>
                    <td>PDF</td>
                    <td><a href="Биология 7 сынып ҚМЖ.docx" class="download-btn">Жүктеу</a></td>
                </tr>
                <tr>
                    <td>8-сынып</td>
                    <td>DOCX</td>
                    <td><a href="Биология 8 сынып ҚМЖ.docx" class="download-btn">Жүктеу</a></td>
                </tr>
                <tr>
                    <td>9-сынып</td>
                    <td>PDF</td>
                    <td><a href="Биология 9 сынып ҚМЖ.docx" class="download-btn">Жүктеу</a></td>
                </tr>
                <tr>
                    <td>10-сынып</td>
                    <td>DOCX</td>
                    <td><a href="Биология 10 сынып ҚМЖ.docx" class="download-btn">Жүктеу</a></td>
                </tr>
                <tr>
                    <td>11-сынып</td>
                    <td>PDF</td>
                    <td><a href="Биология 11 сынып ҚМЖ.docx" class="download-btn">Жүктеу</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
